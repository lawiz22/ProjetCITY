services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: projetcity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-projetcity}
      POSTGRES_USER: ${POSTGRES_USER:-projetcity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-projetcity_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - projetcity_postgres_data:/var/lib/postgresql/data
      - ./sql/schema_postgres.sql:/docker-entrypoint-initdb.d/10-schema_postgres.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-projetcity} -d ${POSTGRES_DB:-projetcity}
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  projetcity_postgres_data:
