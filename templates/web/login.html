<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | Central City Scrutinizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}?v=49">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: var(--bg-primary, #f1f3f5); }
        .auth-card { background: var(--bg-surface, #fff); border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 2.5rem 2rem; width: 100%; max-width: 400px; }
        .auth-card h1 { font-family: 'Sora', sans-serif; font-size: 1.5rem; margin: 0 0 .25rem; text-align: center; }
        .auth-card .subtitle { text-align: center; color: var(--text-secondary, #868e96); font-size: .9rem; margin-bottom: 1.5rem; }
        .auth-card .brand-logo { display: block; margin: 0 auto 1rem; height: 48px; }
        .auth-card label { display: block; font-weight: 500; font-size: .85rem; margin-bottom: .25rem; }
        .auth-card input[type="text"],
        .auth-card input[type="email"],
        .auth-card input[type="password"] { width: 100%; padding: .6rem .75rem; border: 1px solid var(--border-color, #dee2e6); border-radius: 6px; font-size: .95rem; margin-bottom: .75rem; box-sizing: border-box; }
        .auth-card button[type="submit"] { width: 100%; padding: .7rem; border: none; border-radius: 6px; background: var(--accent, #228be6); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: .5rem; }
        .auth-card button[type="submit"]:hover { opacity: .9; }
        .auth-card .auth-links { text-align: center; margin-top: 1rem; font-size: .85rem; }
        .auth-card .auth-links a { color: var(--accent, #228be6); text-decoration: none; }
        .flash-stack { margin-bottom: 1rem; }
        .flash { padding: .6rem .8rem; border-radius: 6px; font-size: .85rem; margin-bottom: .4rem; }
        .flash-error { background: #ffe3e3; color: #c92a2a; }
        .flash-warning { background: #fff3bf; color: #e67700; }
        .flash-success { background: #d3f9d8; color: #2b8a3e; }
        .flash-info { background: #d0ebff; color: #1864ab; }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="{{ url_for('static', filename='images/ccs-logo.png') }}" alt="Central City Scrutinizer" class="brand-logo">
        <h1>Connexion</h1>
        <p class="subtitle">Central City Scrutinizer</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-stack">
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('web.login') }}">
            <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
            <label for="login">Nom d'utilisateur ou email</label>
            <input type="text" id="login" name="login" value="{{ login }}" required autofocus autocomplete="username">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
            <button type="submit">Se connecter</button>
        </form>
        <div class="auth-links">
            <a href="{{ url_for('web.register') }}">Créer un compte</a> &middot;
            <a href="{{ url_for('web.dashboard') }}">Retour au site</a>
        </div>
    </div>
</body>
</html>
