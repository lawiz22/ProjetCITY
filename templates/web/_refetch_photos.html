{# Macro: bouton "Récupérer photos manquantes" + script JS #}

{% macro refetch_button(entity_type, entity_slug, missing_count, btn_class="secondary-button") %}
{% if missing_count and missing_count > 0 %}
<button type="button" class="{{ btn_class }}" id="refetch-missing-btn"
        data-url="{{ url_for('web.photo_refetch_missing', entity_type=entity_type, entity_slug=entity_slug) }}"
        title="Re-télécharger {{ missing_count }} photo(s) manquante(s) depuis leur URL d'image">
    🔄 {{ missing_count }} photo{{ 's' if missing_count != 1 else '' }} manquante{{ 's' if missing_count != 1 else '' }}
</button>
{% endif %}
{% endmacro %}

{% macro refetch_script() %}
<script>
(function(){
    var btn = document.getElementById('refetch-missing-btn');
    if (!btn) return;
    btn.addEventListener('click', function(){
        var url = btn.getAttribute('data-url');
        btn.disabled = true;
        btn.textContent = '⏳ Téléchargement en cours…';
        fetch(url, {method:'POST'})
            .then(function(r){ return r.json(); })
            .then(function(data){
                if (data.fetched > 0) {
                    btn.textContent = '✅ ' + data.fetched + ' récupérée(s)';
                    btn.style.background = '#27ae60';
                    btn.style.color = '#fff';
                    setTimeout(function(){ location.reload(); }, 1500);
                } else if (data.failed > 0) {
                    btn.textContent = '❌ Échec (' + data.failed + ')';
                    btn.style.background = '#c0392b';
                    btn.style.color = '#fff';
                    btn.disabled = false;
                } else {
                    btn.textContent = '✅ Aucune photo manquante';
                    btn.disabled = false;
                }
            })
            .catch(function(err){
                btn.textContent = '❌ Erreur réseau';
                btn.disabled = false;
                console.error(err);
            });
    });
})();
</script>
{% endmacro %}
