<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">ProjetCITY fallback city visual</title>
  <desc id="desc">Illustration locale utilisee quand aucune photo de ville n'est disponible.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#264653"/>
      <stop offset="55%" stop-color="#0f8b8d"/>
      <stop offset="100%" stop-color="#ef6c3d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <g fill="rgba(255,255,255,0.2)">
    <circle cx="180" cy="140" r="110"/>
    <circle cx="980" cy="120" r="140"/>
    <circle cx="1050" cy="580" r="180"/>
  </g>
  <g fill="#fffdfa">
    <rect x="110" y="430" width="90" height="160" rx="8"/>
    <rect x="220" y="360" width="110" height="230" rx="8"/>
    <rect x="360" y="300" width="140" height="290" rx="8"/>
    <rect x="530" y="250" width="120" height="340" rx="8"/>
    <rect x="680" y="330" width="160" height="260" rx="8"/>
    <rect x="870" y="380" width="100" height="210" rx="8"/>
  </g>
  <text x="110" y="130" fill="#fffdfa" font-family="'Space Grotesk', sans-serif" font-size="74" font-weight="700">ProjetCITY</text>
  <text x="110" y="205" fill="#fffdfa" font-family="'Source Sans 3', sans-serif" font-size="34">Visuel local de secours pour l'annuaire des villes</text>
</svg>